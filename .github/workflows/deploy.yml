name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate static site
        run: npx nuxt generate

      - name: Fix asset paths for GitHub Pages subdirectory
        run: |
          REPO="portfolio_2027"
          FILE=".output/public/200.html"
          # Replace /_nuxt/ with /portfolio_2027/_nuxt/ (covers CSS, JS, preload links, buildAssetsDir)
          sed -i "s|/_nuxt/|/${REPO}/_nuxt/|g" "$FILE"
          # Replace /favicon.svg reference in <head>
          sed -i "s|href=\"/favicon\.svg\"|href=\"/${REPO}/favicon.svg\"|g" "$FILE"
          # Fix window.__NUXT__ baseURL so client-side router uses the correct base
          sed -i "s|baseURL:\"/\"|baseURL:\"/${REPO}/\"|g" "$FILE"
          # Create index.html (GitHub Pages root) and 404.html (SPA routing fallback)
          cp "$FILE" .output/public/index.html
          cp "$FILE" .output/public/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
